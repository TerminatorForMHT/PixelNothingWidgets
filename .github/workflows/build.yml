name: Build Android Project

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Clean project
      run: ./gradlew clean

    - name: Compile Kotlin with detailed output
      run: ./gradlew compileDebugKotlin --info 2>&1 | tee compile.log

    - name: Show compile log
      run: |
        echo "=== Last 100 lines of compile log ==="
        tail -100 compile.log
        echo "=== Searching for errors ==="
        grep -i "error:" compile.log || echo "No 'error:' found in log"
        grep -E "^e:" compile.log || echo "No Kotlin errors found"

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
