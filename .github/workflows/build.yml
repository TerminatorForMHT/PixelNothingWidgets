name: Build Android Project

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Clean project
      run: ./gradlew clean

    - name: Compile Kotlin with full output
      run: ./gradlew compileDebugKotlin 2>&1 | tee compile.log

    - name: Find Kotlin errors
      run: |
        echo "=== Searching for Kotlin errors ==="
        grep -E "^e:.*\.kt:" compile.log || echo "No Kotlin errors with 'e:' pattern"
        grep -i "unresolved reference" compile.log || echo "No unresolved reference"
        grep -i "type mismatch" compile.log || echo "No type mismatch"
        grep -i "type inference failed" compile.log || echo "No type inference failed"
        grep -i "cannot find" compile.log || echo "No cannot find"
        grep -i "not found" compile.log || echo "No not found"
        echo ""
        echo "=== Last 50 lines of log ==="
        tail -50 compile.log

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
